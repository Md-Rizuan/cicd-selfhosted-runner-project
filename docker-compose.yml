services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: django_app
    command: sh -c "python manage.py migrate && gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app
    ports:
      - "8005:8000"
    depends_on:
      - db

volumes:
  postgres_data:
