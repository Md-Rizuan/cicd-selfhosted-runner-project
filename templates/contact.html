<form method="post">
    {% csrf_token %}

    <label>Name</label>
    <input type="text" name="name" required>
    <br><br>

    <label>Email</label>
    <input type="email" name="email" required>
    <br><br>

    <label>Subject</label>
    <input type="text" name="subject" required>
    <br><br>

    <label>Message</label>
    <textarea name="message" required></textarea>
    <br><br>

    <button type="submit">Send</button>
</form>
