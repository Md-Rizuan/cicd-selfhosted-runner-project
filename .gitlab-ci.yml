stages:
  - deploy

deploy:
  stage: deploy
  only:
    - main

  before_script:
    - apt-get update -y
    - apt-get install -y openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

  script:
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
        cd ~/devops-practice &&
        git pull origin main &&
        docker-compose down &&
        docker-compose up -d --build
      "
